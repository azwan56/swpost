# Nginx 配置片段 — 添加到现有的 vanpowerCNsite 的 server {} 块中
# 文件位置：/etc/nginx/sites-available/vanpower（或您现有的站点配置文件）
#
# 在 vanpowerCNsite 的 server { ... } 块中，添加以下 location 块：

# ---- 小红书生成器 (swpost) 子路径 ----
location /swpost/ {
    # 将 /swpost/xxx 转发到 Node.js 的 /xxx
    # 注意 proxy_pass 末尾的 / 会自动剥离 /swpost 前缀
    proxy_pass http://127.0.0.1:5001/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # 增大 body 上限（支持多张大图上传）
    client_max_body_size 50M;

    # AI 模型调用超时配置（豆包/百炼接口可能需 30-120 秒）
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
}
