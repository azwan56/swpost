name: Deploy swpost to Alibaba Cloud ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装前端依赖并构建（设置 base 为 /swpost/）
      - name: Install and build frontend
        run: |
          npm ci
          VITE_BASE_PATH=/swpost/ npm run build

      # 4. 编译微信小程序并自动上传到微信后台
      - name: Build and Upload WeChat Mini Program
        env:
          APPID: ${{ secrets.MINIPROGRAM_APPID }}
          PRIVATE_KEY: ${{ secrets.WECHAT_UPLOAD_PRIVATE_KEY }}
        run: |
          cd mp-app
          npm install --no-audit
          npm run build:weapp
          
          # 获取 package.json 中的版本号，以及当前 commit 作为描述
          VERSION=$(node -p "require('./package.json').version")
          DESC="Commit ${GITHUB_SHA::7}"
          
          # 使用 Node.js 写入私钥文件（绕过所有 Shell 转义和换行符丢失的问题）
          node -e "require('fs').writeFileSync('./private.key', process.env.PRIVATE_KEY)"
          
          # 上传小程序到微信公众平台（仅在上传时启用 legacy OpenSSL 以兼容签名算法）
          NODE_OPTIONS=--openssl-legacy-provider npx miniprogram-ci upload \
            --project-path ./ \
            --private-key-path ./private.key \
            --appid "$APPID" \
            --upload-version "$VERSION" \
            --upload-description "$DESC"
            
          # 清除私钥
          rm -f ./private.key

      # 5. 安装后端依赖（仅 production）
      - name: Install server dependencies
        run: |
          cd server
          npm ci --omit=dev

      # 6. 部署到 ECS：同步前端 dist/ + 后端 server/ 
      - name: Deploy to ECS via SSH
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc --delete --exclude='.env'"
          SOURCE: ""
          REMOTE_HOST: ${{ secrets.ECS_HOST }}
          REMOTE_USER: ${{ secrets.ECS_USER }}
          TARGET: /var/www/swpost
          EXCLUDE: ".git, node_modules, .env, .gitignore, .github"

      # 7. 重启 PM2 进程
      - name: Restart PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 兼容加载用户环境
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            
            # 加载系统常用环境变量
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/local/sbin:/usr/sbin:/sbin:$PATH"
            
            echo "=== Diagnostic Information ==="
            echo "Current User: $(whoami)"
            echo "PATH: $PATH"
            echo "Node Version: $(node -v 2>&1 || echo 'Node not found')"
            echo "NPM Version: $(npm -v 2>&1 || echo 'NPM not found')"
            echo "PM2 Version: $(pm2 -v 2>&1 || echo 'PM2 not found')"
            echo "============================="

            cd /var/www/swpost/server || { echo "Directory not found!"; exit 1; }
            
            # 安装或更新服务器依赖
            echo "Installing production dependencies on ECS..."
            npm install --omit=dev --registry=https://registry.npmmirror.com
            
            # 确认 pm2 命令存在，若不存在则尝试使用绝对路径或安装
            if ! command -v pm2 &> /dev/null; then
              echo "PM2 not found in PATH, trying to install globally..."
              npm install -g pm2 || echo "Failed to install PM2"
            fi
            
            # 尝试重新启动应用
            echo "Starting / Restarting app via PM2..."
            pm2 restart swpost-api || pm2 start index.js --name swpost-api || echo "PM2 failed to run"
