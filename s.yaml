# ------------------------------------
#  Serverless Devs Application Configuration (FC 3.0)
# ------------------------------------
edition: 3.0.0
name: xhs-generator
access: default

resources:
  xhs_poster_app:
    component: fc3
    props:
      region: cn-hangzhou
      handler: index.handler
      runtime: custom
      description: 'Xiaohongshu Poster Generator Serverless App'
      timeout: 60
      memorySize: 512
      cpu: 0.5
      diskSize: 512
      code: ./
      customRuntimeConfig:
        command:
          - node
        args:
          - server/index.js
      environmentVariables:
        PORT: '9000'
        DASHSCOPE_API_KEY: ${env(DASHSCOPE_API_KEY)}
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
